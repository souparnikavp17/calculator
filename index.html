<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="main">
        <div class="display">
            <div class="output"></div>
        </div>


        <div class="keys">
    <div class="left">
        <div class="clear">
            <button class="key clear-btn AC">AC</button>
            <button class="key clear-btn C">C</button>
        </div>

        <div class="bottom">
            <button class="key digit" data-value="1">1</button>
            <button class="key digit" data-value="2">2</button>
            <button class="key digit" data-value="3">3</button>
            <button class="key digit" data-value="4">4</button>
            <button class="key digit" data-value="5">5</button>
            <button class="key digit" data-value="6">6</button>
            <button class="key digit" data-value="7">7</button>
            <button class="key digit" data-value="8">8</button>
            <button class="key digit" data-value="9">9</button>
            <button class="key digit" data-value="0">0</button>
            
        </div>
    </div>

    <div class="operators">
        <button class="key operator" data-value="+">+</button>
        <button class="key operator" data-value="-">-</button>
        <button class="key operator" data-value="*">x</button>
        <button class="key operator" data-value="/">÷</button>
        <button class="key operator" data-value="=">=</button>
    </div>
</div>
    </div>
    </div>
</body>

</html>
